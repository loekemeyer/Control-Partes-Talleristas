<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inicio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #d9d9de;
      padding: 24px;
    }

    .contenedor {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
    }

    .modulo {
      background: #ececec;
      border-radius: 18px;
      padding: 22px 20px 26px;
      width: 320px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .modulo h2 {
      margin: 0 0 18px 0;
      text-align: center;
      font-size: 24px;
      color: #222;
    }

    .botonera {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn-opcion {
      width: 100%;
      max-width: 240px;
      padding: 12px 18px;
      border: 2px solid #b5b5b5;
      border-radius: 999px;
      background: #f7f7f7;
      color: #222;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-opcion:hover {
      background: #e7e7e7;
      border-color: #8f8f8f;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .modulo {
        width: 100%;
        max-width: 420px;
      }
    }
  </style>
</head>
<body>

  <div class="contenedor">

    <div class="modulo">
      <h2>Talleristas</h2>
      <div class="botonera">
        <button class="btn-opcion" data-link="../Talleristas/Control Tall/ControlTall.html">Control</button>
        <button class="btn-opcion" data-link="../Talleristas/Envios/EnviosTall.html">Envíos</button>
      </div>
    </div>

    <div class="modulo">
      <h2>Prov Serv</h2>
      <div class="botonera">
        <button class="btn-opcion" data-link="../Prov Serv/Control/ControlPS.html">Control</button>
        <button class="btn-opcion" data-link="../Prov Serv/Entregas/EntregaPS.html">Entregas</button>
        <button class="btn-opcion" data-link="../Prov Serv/Envios/EnviosPS.html">Envíos</button>
      </div>
    </div>

    <div class="modulo">
      <h2>Stocks</h2>
      <div class="botonera">
        <button class="btn-opcion" data-link="../StockSP/StockSP.html">Stock SP</button>
        <button class="btn-opcion" data-link="../StockSC/StockSC.html">Stock SC</button>
        <button class="btn-opcion" data-link="../Stocks General/StocksGeneral.html">Stocks General</button>
      </div>
    </div>

  </div>

  <script>
    document.querySelectorAll(".btn-opcion").forEach(btn => {
      btn.addEventListener("click", () => {
        const link = btn.getAttribute("data-link");
        if (link) window.location.href = link;
      });
    });
  </script>

</body>
</html>
