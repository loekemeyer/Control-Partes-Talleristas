<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Selector</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #d9d9de;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      flex: 1 1 380px;
      background: #ececec;
      border: 1px solid #cfcfcf;
      border-radius: 18px;
      padding: 22px 20px 28px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.7),
        0 2px 6px rgba(0,0,0,0.05);
    }

    h2 {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    .botones {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn-opcion {
      width: 100%;
      max-width: 260px;
      height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      border: 3px solid #b9b9b9;
      background: #f7f7f7;
      font-size: 16px;
      cursor: pointer;
      transition: 0.15s ease;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        0 1px 0 rgba(0,0,0,0.04);
    }

    .btn-opcion:hover {
      border-color: #7f7f7f;
      font-weight: 700;
      background: #e5e5e5;
    }

    /* Mobile */
    @media (max-width: 600px){
      .container{
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- ======================
         TALLERISTA
    ======================= -->
    <div class="card">
      <h2>Tallerista</h2>

      <div class="botones">
        <button class="btn-opcion" data-link="../Talleristas/Control Tall/ControlTall.html">
          Control
        </button>

        <button class="btn-opcion" data-link="../Talleristas/Envios/EnviosTall.html">
          Envío
        </button>

        <button class="btn-opcion" data-link="../Talleristas/Recepcion/Recepcion Cervantes.html">
          Entrega Cervantes
        </button>

        <button class="btn-opcion" data-link="../Talleristas/Recepcion/Recepcion Virgilio.html">
          Entrega Virgilio
        </button>
      </div>
    </div>

    <!-- ======================
         PS
    ======================= -->
    <div class="card">
      <h2>PS</h2>

      <div class="botones">
        <button class="btn-opcion" data-link="../Prov Serv/Control/ControlPS.html">
          Control
        </button>
        <button class="btn-opcion" data-link="../Prov Serv/Envios/EnviosPS.html">
          Envío
        </button>
        <button class="btn-opcion" data-link="../Prov Serv/Entregas/EntregaPS.html">
          Entrega
        </button>
      </div>
    </div>

    <!-- ======================
         STOCKS GENERAL
    ======================= -->
    <div class="card">
      <h2>Stocks</h2>

      <div class="botones">
        <button class="btn-opcion" data-link="../Stocks General/StocksGeneral.html">
          Stocks general
        </button>
      </div>
    </div>

  </div>

  <script>
    const botones = document.querySelectorAll(".btn-opcion");

    botones.forEach(btn => {
      btn.addEventListener("click", () => {
        const destino = btn.dataset.link;
        if (destino) {
          window.location.href = destino;
        }
      });
    });
  </script>

</body>
</html>
