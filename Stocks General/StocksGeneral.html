<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stocks general</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="StocksGeneral.css" />
</head>
<body>
  <div class="stocks-general-page">
    <div class="stocks-general-card">
      <div class="stocks-general-header">
        <div>
          <h1>Stocks general x Parte</h1>
          <p>Stock online por rubro: Sector Procesado, Proveedores de Servicios y Talleristas</p>
        </div>

        <div class="stocks-general-actions">
          <button id="btnInicio" class="btn btn-dark">Inicio</button>
        </div>
      </div>

      <div class="stocks-general-filters">
        <div class="field">
          <label for="txtBuscar">Buscar</label>
          <input id="txtBuscar" type="text" placeholder="Descripción..." />
        </div>

        <div class="field">
          <label for="selSoloConStock">Mostrar</label>
          <select id="selSoloConStock">
            <option value="todos">Todos</option>
            <option value="conStock">Solo con stock</option>
            <option value="sinStock">Solo sin stock</option>
          </select>
        </div>

        <div class="field">
          <label for="selFormatoStock">Formato</label>
          <select id="selFormatoStock">
            <option value="uni">Unidades</option>
            <option value="kg">Kg</option>
            <option value="caj">Cajón</option>
          </select>
        </div>

        <div class="field field-button">
          <button id="btnRecargar" class="btn">Recargar</button>
        </div>
      </div>

      <div id="lblEstado" class="stocks-general-status">Cargando...</div>

      <div class="stocks-general-table-wrap">
        <table class="stocks-general-table">
          <thead>
            <tr>
              <th>Sector/es</th>
              <th>Descripción</th>
              <th>SC</th>
              <th>SP</th>
              <th>PS</th>
              <th>Tall</th>
            </tr>
          </thead>
          <tbody id="tbodyStocksGeneral">
            <tr>
              <td colspan="6" class="empty">Cargando datos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="StocksGeneral.js"></script>
</body>
</html>
