<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Recepción Mercaderia</title>

<style>
  *{box-sizing:border-box}
  body{font-family:Arial;background:#fafafa;padding:18px}
  .card{max-width:540px;margin:auto;background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
  button{padding:10px 12px;border-radius:10px;border:2px solid #d0d7de;background:#fff;font-weight:800;cursor:pointer}
  button.active{background:#111;color:#fff;border-color:#111}
  button:disabled{opacity:.45;cursor:not-allowed}
  input[type="text"],input[type="number"]{
    height:42px;border-radius:10px;border:2px solid #d0d7de;padding:0 10px;font-size:16px
  }
  input[type="text"]{width:130px;text-align:center;letter-spacing:4px}
  .send{background:#111;color:#fff;border:0;opacity:.45}
  .send.enabled{opacity:1}
  .status{margin-top:10px;font-size:14px}
  .ok{color:#0a7a2f;font-weight:800}
  .bad{color:#b42318}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:16px}
  .overlay.open{display:flex}
  .modal{
    width:min(720px, 100%);
    max-height:90vh;
    overflow-y:auto;
    background:#fff;
    border:1px solid #d0d7de;
    border-radius:14px;
    padding:14px;
    box-shadow:0 18px 50px rgba(0,0,0,.2);
  }

  .grid{
    display:grid;
    grid-template-columns:110px 90px minmax(220px,1fr);
    gap:10px;
    align-items:center;
  }
  .grid .h{font-weight:900;font-size:13px;color:#333}

  .grid input[data-role="cajas"]{
    width:100% !important;
    min-width:0;
    text-align:center;
    letter-spacing:0 !important;
  }

  .descCell{
    font-size:13px;
    color:#333;
    line-height:1.25;
    white-space:normal;
    word-break:break-word;
    overflow-wrap:anywhere;
  }

  .modal-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .modal-title{font-weight:900}
  .xbtn{border:2px solid #d0d7de;background:#fff;border-radius:10px;padding:8px 10px;cursor:pointer;font-weight:900}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
  .btn-primary{background:#111;color:#fff;border:0}
  .btn-secondary{background:#fff}
  .hint{font-size:12px;color:#444;margin:8px 0 0}

  #sendModal:disabled, #enviar:disabled, #okBtn:disabled{opacity:.55; cursor:not-allowed}

  .hidden{display:none}

  .successBox{
    display:none;
    margin-top:12px;
    border:2px solid #c7e8d1;
    background:#f3fbf6;
    border-radius:12px;
    padding:12px;
  }
  .successBox .title{font-weight:900;margin:0 0 6px}
  .successCode{
    font-size:22px;
    font-weight:900;
    letter-spacing:2px;
    margin:6px 0 10px;
  }
  .okBtn{
    background:#111;color:#fff;border:0;
    padding:10px 14px;border-radius:10px;font-weight:900;
  }

  .codeRO{
    background:#f6f8fa;
    width:100% !important;
    text-align:left !important;
    letter-spacing:0 !important;
  }

  #nombreTP{margin-top:-4px}
</style>
</head>

<body>
 <button onclick="window.location.href='../../Inicio/index.html'" class="btn-home" type="button">
   ← Inicio
 </button>
<div class="card">
  <h2 style="margin:0 0 10px">Recepción Talleristas Virgilio</h2>

  <div class="row">
    <button id="lk" type="button">LK</button>
    <button id="ch" type="button">CH</button>
  </div>

  <div class="row">
    <div style="font-weight:800;align-self:center">Cod Tall/Prov</div>
    <input id="codProveedor" type="text" maxlength="4" placeholder="0000" inputmode="numeric">
  </div>

  <div id="nombreTP" class="status"></div>

  <div class="row">
    <label style="display:flex;align-items:center;gap:8px;font-weight:800">
      <input id="c1" type="checkbox"> Carga a ISIS
    </label>
  </div>

  <div class="row">
    <button id="enviar" class="send" type="button" disabled>Enviar</button>
  </div>

  <div id="status" class="status bad">Completá todo para continuar.</div>

  <div id="successBox" class="successBox">
    <div class="title">Envío registrado</div>
    <div>Tu código de envío:</div>
    <div id="successCode" class="successCode">—</div>
    <button id="okBtn" class="okBtn" type="button">OK</button>
  </div>

  <iframe name="sheet_iframe" style="display:none"></iframe>
  <form id="sheetForm" action="https://script.google.com/macros/s/AKfycbz3jZ7oahGOULPWKnTJGTTh_HIpLpyILu8tWkNHg6U_r5s7R3osFh3cQV5G7FUq8oXs/exec" method="POST" target="sheet_iframe" class="hidden">
    <input type="hidden" name="payload" id="payloadField" value="">
  </form>
</div>

<div id="overlay" class="overlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <div id="modalTitle" class="modal-title">Código y Cajas</div>
      <button id="closeModal" class="xbtn" type="button">✕</button>
    </div>

    <div class="grid" style="margin-bottom:8px">
      <div class="h">Código</div>
      <div class="h">Cajas</div>
      <div class="h">Descripción</div>
    </div>

    <div id="lines" class="grid"></div>

    <div class="hint">Tip: completá solo cajas. Solo acepta números enteros.</div>

    <div class="modal-actions">
      <button id="cancelModal" class="xbtn btn-secondary" type="button">Cancelar</button>
      <button id="sendModal" class="xbtn btn-primary" type="button">Enviar</button>
    </div>

    <div id="modalMsg" class="status" style="margin-top:10px"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
  // ===== Config =====
  const SUCURSAL = "Virg";

  const SUPABASE_URL = "https://hrxfctzncixxqmpfhskv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_BqpAgZH6ty-9wft10_YMhw_0rcIPuWT";

  const SUPABASE_TABLE = "Articulos Virgilio X Tallerista";
  const COL_TALLERISTA = "Cod_Tallerista";
  const COL_CODIGO = "Cod_Art";
  const COL_DESC = "Desc";
  const COL_TALLERISTA_NOMBRE = "Tallerista";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ===== DOM =====
  const lk = document.getElementById("lk");
  const ch = document.getElementById("ch");
  const cod = document.getElementById("codProveedor");
  const nombreTP = document.getElementById("nombreTP");
  const c1 = document.getElementById("c1");
  const enviar = document.getElementById("enviar");
  const status = document.getElementById("status");

  const successBox = document.getElementById("successBox");
  const successCodeEl = document.getElementById("successCode");
  const okBtn = document.getElementById("okBtn");

  const overlay = document.getElementById("overlay");
  const closeModal = document.getElementById("closeModal");
  const cancelModal = document.getElementById("cancelModal");
  const sendModal = document.getElementById("sendModal");
  const linesWrap = document.getElementById("lines");
  const modalMsg = document.getElementById("modalMsg");

  const sheetForm = document.getElementById("sheetForm");
  const payloadField = document.getElementById("payloadField");
  const iframe = document.querySelector('iframe[name="sheet_iframe"]');

  // ===== Estado =====
  let empresa = null;
  let isSubmitting = false;
  let lastSendCode = null;
  let fetchedCodes = [];
  let proveedorNombre = "";
  let proveedorValido = false;

  // ===== Empresa =====
  function selectEmpresa(v){
    empresa = v;
    lk.classList.toggle("active", v === "LK");
    ch.classList.toggle("active", v === "CH");
    update();
  }

  lk.onclick = () => selectEmpresa("LK");
  ch.onclick = () => selectEmpresa("CH");

  // ===== Input código proveedor =====
  cod.oninput = async () => {
    cod.value = cod.value.replace(/\D/g, "").slice(0, 4);

    if (cod.value.length === 4){
      await buscarTalleristaAutomatico();
    } else {
      fetchedCodes = [];
      proveedorNombre = "";
      proveedorValido = false;
      nombreTP.className = "status";
      nombreTP.textContent = "";
    }

    update();
  };

  c1.onchange = update;

  function ready(){
    return !isSubmitting && !!empresa && cod.value.length === 4 && c1.checked && proveedorValido;
  }

  function update(){
    const ok = ready();
    enviar.disabled = !ok;
    enviar.classList.toggle("enabled", ok);
    status.className = "status " + (ok ? "ok" : "bad");
    status.textContent = ok ? "Listo para continuar." : "Completá todo para continuar.";
  }

  // ===== Helpers =====
  function arDateISO(){
    const fmt = new Intl.DateTimeFormat("sv-SE", {
      timeZone: "America/Argentina/Buenos_Aires",
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    });
    return fmt.format(new Date());
  }

  function genNumericCode(len = 4){
    const min = Math.pow(10, len - 1);
    const max = Math.pow(10, len) - 1;
    return String(Math.floor(min + Math.random() * (max - min + 1)));
  }

  function showSuccess(code){
    successCodeEl.textContent = code;
    successBox.style.display = "block";
  }

  function hideSuccess(){
    successBox.style.display = "none";
    successCodeEl.textContent = "—";
  }

  function closeModalFn(){
    overlay.classList.remove("open");
    overlay.setAttribute("aria-hidden","true");
  }

  function openModalFn(){
    modalMsg.textContent = "";
    modalMsg.className = "status";
    overlay.classList.add("open");
    overlay.setAttribute("aria-hidden","false");
  }

  function resetAll(){
    empresa = null;
    lk.classList.remove("active");
    ch.classList.remove("active");

    cod.value = "";
    nombreTP.textContent = "";
    nombreTP.className = "status";
    c1.checked = false;

    closeModalFn();
    linesWrap.innerHTML = "";
    modalMsg.textContent = "";
    modalMsg.className = "status";

    isSubmitting = false;
    lastSendCode = null;
    fetchedCodes = [];
    proveedorNombre = "";
    proveedorValido = false;

    sendModal.disabled = false;
    closeModal.disabled = false;
    cancelModal.disabled = false;

    hideSuccess();
    update();
  }

  okBtn.onclick = () => resetAll();

  // ===== Supabase =====
  async function fetchCodesForTallerista(tallerista4){
    const { data, error } = await sb
      .from(SUPABASE_TABLE)
      .select(`${COL_CODIGO}, ${COL_DESC}, ${COL_TALLERISTA_NOMBRE}`)
      .eq(COL_TALLERISTA, tallerista4)
      .order(COL_CODIGO, { ascending: true });

    if (error) throw error;

    const uniques = [];
    const seen = new Set();

    proveedorNombre = "";

    (data || []).forEach(r => {
      const codigo = String(r[COL_CODIGO] ?? "").trim();
      const desc = String(r[COL_DESC] ?? "").trim();
      const talleristaNombre = String(r[COL_TALLERISTA_NOMBRE] ?? "").trim();

      if (!proveedorNombre && talleristaNombre) {
        proveedorNombre = talleristaNombre;
      }

      if (!codigo) return;

      const key = codigo + "||" + desc;
      if (seen.has(key)) return;

      seen.add(key);
      uniques.push({ codigo, desc });
    });

    return uniques;
  }

  async function buscarTalleristaAutomatico(){
    const tallerista4 = cod.value.trim();

    if (tallerista4.length !== 4){
      fetchedCodes = [];
      proveedorNombre = "";
      proveedorValido = false;
      nombreTP.className = "status";
      nombreTP.textContent = "";
      return;
    }

    try{
      nombreTP.className = "status";
      nombreTP.textContent = "Buscando...";

      fetchedCodes = await fetchCodesForTallerista(tallerista4);

      if (fetchedCodes.length){
        proveedorValido = true;
        nombreTP.className = "status ok";
        nombreTP.textContent = proveedorNombre
          ? `Nombre Tall/Prov: ${proveedorNombre}`
          : "Nombre Tall/Prov: sin nombre cargado";
      } else {
        proveedorValido = false;
        nombreTP.className = "status bad";
        nombreTP.textContent = "No hay un Tallerista/Proveedor con ese código.";
      }

    } catch(e){
      console.error(e);
      fetchedCodes = [];
      proveedorNombre = "";
      proveedorValido = false;
      nombreTP.className = "status bad";
      nombreTP.textContent = "Error consultando la base.";
    }
  }

  // ===== Modal =====
  function buildModalLinesWithCodes(codes){
    linesWrap.innerHTML = "";

    if (!codes.length){
      const msg = document.createElement("div");
      msg.style.gridColumn = "1 / -1";
      msg.className = "status bad";
      msg.textContent = "No hay códigos asociados a ese tallerista.";
      linesWrap.appendChild(msg);
      return;
    }

    codes.forEach((item, i) => {
      const code = document.createElement("input");
      code.type = "text";
      code.value = item.codigo;
      code.readOnly = true;
      code.className = "codeRO";
      code.setAttribute("data-role","codigo");
      code.setAttribute("data-idx", String(i));

      const cajas = document.createElement("input");
      cajas.type = "text";
      cajas.inputMode = "numeric";
      cajas.placeholder = "0";
      cajas.setAttribute("data-role","cajas");
      cajas.setAttribute("data-idx", String(i));

      cajas.addEventListener("input", () => {
        cajas.value = cajas.value.replace(/\D/g, "");
      });

      cajas.addEventListener("keydown", (e) => {
        if (e.key === "Enter"){
          e.preventDefault();
          const next = linesWrap.querySelector(`input[data-role="cajas"][data-idx="${i + 1}"]`);
          if (next) next.focus();
        }
      });

      const desc = document.createElement("div");
      desc.className = "descCell";
      desc.textContent = item.desc || "";

      linesWrap.appendChild(code);
      linesWrap.appendChild(cajas);
      linesWrap.appendChild(desc);
    });

    const firstCaja = linesWrap.querySelector('input[data-role="cajas"][data-idx="0"]');
    if (firstCaja) firstCaja.focus();
  }

 function getItemsFromModal(){
  const codes = Array.from(linesWrap.querySelectorAll('input[data-role="codigo"]'));

  return codes.map((c, i) => {
    const cajasEl = linesWrap.querySelector(`input[data-role="cajas"][data-idx="${i}"]`);
    const valor = cajasEl ? String(cajasEl.value || "").trim() : "";
    const itemBase = fetchedCodes[i] || {};

    return {
      codigo: String(c.value || "").trim(),
      kg: valor,
      desc: String(itemBase.desc || "").trim()
    };
  });
}

  function filterItemsToSend(items){
    return items.filter(it => {
      const valor = String(it.kg || "").trim();
      if (valor === "") return false;
      const n = Number(valor);
      return !Number.isNaN(n) && n > 0;
    });
  }

  // ===== UI =====
  enviar.onclick = async () => {
    if (!proveedorValido){
      status.className = "status bad";
      status.textContent = "No hay un proveedor válido para ese código.";
      return;
    }

    if (!ready()) return;

    hideSuccess();

    try{
      enviar.disabled = true;
      enviar.classList.remove("enabled");

      if (!fetchedCodes.length){
        status.className = "status bad";
        status.textContent = "No hay códigos asociados a ese tallerista.";
        return;
      }

      buildModalLinesWithCodes(fetchedCodes);
      openModalFn();

    } catch (e){
      console.error(e);
      status.className = "status bad";
      status.textContent = "Error armando la ventana.";
    } finally {
      enviar.disabled = !ready();
      update();
    }
  };

  closeModal.onclick = () => {
    if (!isSubmitting) closeModalFn();
  };

  cancelModal.onclick = () => {
    if (!isSubmitting) closeModalFn();
  };

  overlay.addEventListener("click", (e) => {
    if (!isSubmitting && e.target === overlay) closeModalFn();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && overlay.classList.contains("open") && !isSubmitting) {
      closeModalFn();
    }
  });

  iframe.addEventListener("load", () => {
    if (!isSubmitting) return;

    isSubmitting = false;
    sendModal.disabled = false;
    closeModal.disabled = false;
    cancelModal.disabled = false;

    update();

    modalMsg.className = "status ok";
    modalMsg.textContent = "Enviado a Sheet.";

    status.className = "status ok";
    status.textContent = "Enviado a Sheet.";

    closeModalFn();

    if (lastSendCode) showSuccess(lastSendCode);
  });

  sendModal.onclick = () => {
    if (isSubmitting) return;

    if (!fetchedCodes.length){
      modalMsg.className = "status bad";
      modalMsg.textContent = "No hay códigos para enviar.";
      return;
    }

    const rawItems = getItemsFromModal();
    const items = filterItemsToSend(rawItems);

    if (items.length === 0){
      modalMsg.className = "status bad";
      modalMsg.textContent = "Completá al menos una caja (> 0).";
      return;
    }

    const codigoWidth = Math.max(...items.map(it => it.codigo.length), "Código".length, 6);
    const cajaWidth = Math.max(...items.map(it => String(it.kg).length), "Cajas".length, 2);

    const header =
      `${"Código".padEnd(codigoWidth, " ")}   ${"Cajas".padStart(cajaWidth, " ")}   Descripción`;

    const separator =
      `${"-".repeat(codigoWidth)}   ${"-".repeat(cajaWidth)}   ${"-".repeat(20)}`;

    const detalle = items
      .map(it => {
        const codTxt = it.codigo.padEnd(codigoWidth, " ");
        const cajaTxt = String(it.kg).padStart(cajaWidth, " ");
        return `${codTxt}   ${cajaTxt}   ${it.desc}`;
      })
      .join("\n");

    const ok = confirm(
      `¿Está seguro de las cantidades?\n\n${header}\n${separator}\n${detalle}`
    );
    if (!ok) return;

    lastSendCode = genNumericCode(4);

const itemsToSend = items.map(it => ({
  codigo: String(it.codigo || "").trim(),
  kg: String(it.kg || "").trim(),
  desc: String(it.desc || "").trim()
}));

const payload = {
  fecha: arDateISO(),
  empresa: empresa,
  codTallProv: cod.value.trim(),
  sucursal: SUCURSAL,
  codigoEnvio: lastSendCode,
  items: itemsToSend
};

    try{
      isSubmitting = true;
      sendModal.disabled = true;
      closeModal.disabled = true;
      cancelModal.disabled = true;

      update();

      modalMsg.className = "status";
      modalMsg.textContent = "Enviando a Sheet...";

      payloadField.value = JSON.stringify(payload);
      sheetForm.submit();

    } catch(e){
      isSubmitting = false;
      sendModal.disabled = false;
      closeModal.disabled = false;
      cancelModal.disabled = false;

      update();

      modalMsg.className = "status bad";
      modalMsg.textContent = "Error enviando: " + (e?.message || e);
    }
  };

  update();
</script>
</body>
</html>
